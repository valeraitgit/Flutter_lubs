# ──────────────────────────────────────────────
# HorizontalPodAutoscaler — автомасштабирование
# При нагрузке CPU > 70% добавляет реплики (до 5)
# ──────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eventhub-backend-hpa
  namespace: eventhub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eventhub-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
