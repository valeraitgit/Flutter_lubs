# ──────────────────────────────────────────────
# ConfigMap — конфигурация приложения
# ──────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: eventhub-config
  namespace: eventhub
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"

---
# ──────────────────────────────────────────────
# Service NodePort — прямой доступ к API
# для мобильного Flutter-клиента (Android/iOS)
# URL: http://<NodeIP>:30800
# ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: eventhub-backend-nodeport
  namespace: eventhub
  labels:
    app: eventhub-backend
spec:
  selector:
    app: eventhub-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30800     # фиксированный порт на каждом узле кластера
  type: NodePort
